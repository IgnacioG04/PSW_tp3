<div class="d-flex justify-content-between align-items-center flex-wrap mb-3 gap-2">
  <h2 class="mb-0">Juego de Memoria</h2>
  <div class="d-flex gap-2 align-items-center flex-wrap">
    <span class="badge bg-info text-dark fs-6 px-3 py-2">Intentos: {{ intentosRestantes }}</span>
    <button class="btn btn-primary" (click)="iniciar()" [disabled]="juegoIniciado && !victoria && !derrota">
      INICIAR
    </button>
    <button class="btn btn-warning" (click)="reiniciar()" [disabled]="!juegoIniciado">
      REINICIAR
    </button>
    <button class="btn btn-success" (click)="intentar()"
            [disabled]="!juegoIniciado || puedeVoltear || victoria || derrota">
      INTENTAR
    </button>
  </div>
</div>

<div class="alert alert-success text-center fw-bold" *ngIf="victoria">
  ¡Ganaste! Encontraste todas las parejas.
</div>
<div class="alert alert-danger text-center fw-bold" *ngIf="derrota">
  Se acabaron los intentos. ¡Probá de nuevo!
</div>

<div class="alert alert-info text-center" *ngIf="!juegoIniciado">
  Presioná INICIAR para comenzar el juego.
</div>

<div class="row g-3" *ngIf="juegoIniciado">
  <div class="col-3 col-md-2" *ngFor="let carta of tablero">
    <div class="carta"
         (click)="voltear(carta)"
         [class.disabled]="!puedeVoltear || carta.descubierta || carta.volteada"
         [class.descubierta]="carta.descubierta">
      <img [src]="(carta.volteada || carta.descubierta) ? carta.img : cartaTapada"
           [alt]="carta.volteada ? 'carta ' + carta.valor : 'tapada'"
           class="carta-img">
    </div>
  </div>
</div>
