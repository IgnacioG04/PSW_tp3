<h2 class="mb-4">Próximos Eventos</h2>

<div class="card shadow border-0">
  <img [src]="eventoActual.img" [alt]="eventoActual.nombre" class="card-img-top slide-img">
  <div class="card-body p-4 text-center">
    <h3 class="card-title fw-bold">{{ eventoActual.nombre }}</h3>
    <p class="card-text text-muted">{{ eventoActual.descripcion }}</p>

    <div class="d-flex justify-content-between align-items-center mt-4">
      <button class="btn btn-outline-primary px-4" (click)="anterior()">
        &laquo; Anterior
      </button>
      <span class="text-muted fw-bold">
        {{ indiceActual + 1 }} / {{ eventos.length }}
      </span>
      <button class="btn btn-primary px-4" (click)="siguiente()">
        Siguiente &raquo;
      </button>
    </div>
  </div>
</div>
